# This profile activates on Render with SPRING_PROFILES_ACTIVE=prod
spring:
  datasource:
    # Your NeonDB connection string from neon.tech dashboard
    # Project → Connection Details → copy the "Connection string"
    # It looks like: postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # NeonDB free tier sleeps after inactivity
      # These settings handle the reconnection when it wakes up
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            # Scopes we request from Google:
            # openid = required for OAuth2
            # email = user's email address
            # profile = user's name and profile picture
            scope: openid, email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          # GitHub registration — add this block
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            # GitHub scopes:
            # read:user = access to user's public profile info
            # user:email = access to user's email addresses
            # Without user:email, GitHub may not return email for private accounts
            scope: read:user, user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  data:
    redis:
      url: ${REDIS_URL}


  # spring cache backed by redis
  # @Cachbeable will use redis as the cache provider
    cache:
        type: redis
        redis:
          # Cache entries expire after 5 minutes
            time-to-live: 300000 # 10 minutes in milliseconds

  ai:
    openai:
      base-url: https://api.groq.com/openai/v1
      api-key: ${GROQ_API_KEY}
      chat:
        model: ${GROQ_CHAT_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
        options:
          temperature: 0.3
      # Tell Spring AI: do NOT create an OpenAI embedding bean
      # Without this, Spring sees two EmbeddingModel beans and picks OpenAI's
      embedding:
        enabled: false

    mistralai:
      api-key: ${MISTRAL_API_KEY}
      embedding:
        options:
          model: mistral-embed
#app level config for model routing
#Changing models required only envrionment varible change, no code chnage
app:
  models:
    # Fast model for chat — high volume, needs low latency
    chat: ${GROQ_CHAT_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
    #smarter model for debug - needs reasoning ability, lower volume
    reasoning: ${GROQ_REASONING_MODEL:meta-llama/llama3-70b-8192}
    #Realiable JSON model for interviews - needs format adherence
    structured: ${GROQ_STRUCTURED_MODEL:meta-llama/mixtral-8x7b-32768}


logging:
  level:
    com.repomind.repomind: INFO

