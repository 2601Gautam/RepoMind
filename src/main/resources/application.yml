spring:
  application:
    name: repomind
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Add these under the existing config:
app:
  jwt:
    # Secret key for signing JWTs — must be at least 256 bits (32 characters)
    # Generate a random one: https://generate-secret.vercel.app/32
    # Store as environment variable — never hardcode in yml
    secret: ${JWT_SECRET}
    # Token valid for 7 days in milliseconds (604800000 = 7*24*60*60*1000)
    expiration: 604800000
  cookie:
    secure: true
    same-site: None

  cors:
    # Your Vercel frontend URL — update after deployment
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}

logging:
  level:
    com.repomind: DEBUG
    org.springframework.ai: INFO